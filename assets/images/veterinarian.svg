<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#vetGrad)"/>
  
  <!-- Head -->
  <circle cx="100" cy="70" r="28" fill="white"/>
  
  <!-- Hair -->
  <ellipse cx="100" cy="50" rx="32" ry="20" fill="#333"/>
  
  <!-- Eyes -->
  <circle cx="92" cy="65" r="3" fill="#333"/>
  <circle cx="108" cy="65" r="3" fill="#333"/>
  
  <!-- Smile -->
  <path d="M 92,75 Q 100,80 108,75" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Body -->
  <rect x="75" y="100" width="50" height="45" rx="5" fill="white"/>
  
  <!-- Stethoscope on chest -->
  <g transform="translate(100, 115)">
    <circle cx="0" cy="5" r="3" fill="#1e3a8a"/>
    <path d="M -3,5 Q -8,0 -8,-6" stroke="#1e3a8a" stroke-width="2" fill="none"/>
    <path d="M 3,5 Q 8,0 8,-6" stroke="#1e3a8a" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Arms -->
  <rect x="60" y="105" width="15" height="40" rx="7" fill="white"/>
  <rect x="125" y="105" width="15" height="40" rx="7" fill="white"/>
</svg>