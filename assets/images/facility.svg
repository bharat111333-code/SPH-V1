<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="facilityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="300" fill="#f8fafc"/>
  
  <!-- Building/Hospital -->
  <g transform="translate(50, 80)">
    <!-- Main building -->
    <rect x="0" y="40" width="200" height="120" fill="url(#facilityGrad)" stroke="#0f172a" stroke-width="2"/>
    
    <!-- Roof -->
    <polygon points="0,40 100,0 200,40" fill="#10b981" stroke="#0f172a" stroke-width="2"/>
    
    <!-- Door -->
    <rect x="80" y="130" width="40" height="60" fill="#fbbf24" stroke="#0f172a" stroke-width="2"/>
    <circle cx="115" cy="160" r="3" fill="#0f172a"/>
    
    <!-- Windows -->
    <g stroke="#0f172a" stroke-width="2" fill="none">
      <!-- Top row -->
      <rect x="15" y="55" width="25" height="25"/>
      <rect x="55" y="55" width="25" height="25"/>
      <rect x="95" y="55" width="25" height="25"/>
      <rect x="135" y="55" width="25" height="25"/>
      <rect x="175" y="55" width="25" height="25"/>
      
      <!-- Bottom row -->
      <rect x="15" y="95" width="25" height="25"/>
      <rect x="55" y="95" width="25" height="25"/>
      <rect x="95" y="95" width="25" height="25"/>
      <rect x="135" y="95" width="25" height="25"/>
      <rect x="175" y="95" width="25" height="25"/>
    </g>
    
    <!-- Window panes -->
    <g stroke="#0f172a" stroke-width="1" opacity="0.5">
      <line x1="27.5" y1="55" x2="27.5" y2="80"/>
      <line x1="15" y1="67.5" x2="40" y2="67.5"/>
      <line x1="67.5" y1="55" x2="67.5" y2="80"/>
      <line x1="55" y1="67.5" x2="80" y2="67.5"/>
      <line x1="107.5" y1="55" x2="107.5" y2="80"/>
      <line x1="95" y1="67.5" x2="120" y2="67.5"/>
      <line x1="147.5" y1="55" x2="147.5" y2="80"/>
      <line x1="135" y1="67.5" x2="160" y2="67.5"/>
      <line x1="187.5" y1="55" x2="187.5" y2="80"/>
      <line x1="175" y1="67.5" x2="200" y2="67.5"/>
    </g>
  </g>
  
  <!-- Medical cross symbol -->
  <g transform="translate(120, 220)">
    <circle cx="0" cy="0" r="25" fill="#fbbf24" opacity="0.8"/>
    <rect x="-3" y="-12" width="6" height="24" fill="white"/>
    <rect x="-12" y="-3" width="24" height="6" fill="white"/>
  </g>
</svg>