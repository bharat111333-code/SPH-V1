<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circular background -->
  <circle cx="200" cy="200" r="190" fill="white" stroke="url(#logoGrad)" stroke-width="4"/>
  
  <!-- Medical cross -->
  <g transform="translate(140, 140)">
    <rect x="20" y="0" width="20" height="60" fill="#1e3a8a" rx="3"/>
    <rect x="0" y="20" width="60" height="20" fill="#1e3a8a" rx="3"/>
  </g>
  
  <!-- Paw -->
  <g transform="translate(220, 180)">
    <!-- Main pad -->
    <ellipse cx="0" cy="20" rx="15" ry="20" fill="#10b981"/>
    <!-- Toe pads -->
    <circle cx="-28" cy="-5" r="12" fill="#10b981"/>
    <circle cx="-14" cy="-25" r="12" fill="#10b981"/>
    <circle cx="14" cy="-25" r="12" fill="#10b981"/>
    <circle cx="28" cy="-5" r="12" fill="#10b981"/>
  </g>
  
  <!-- Text circle -->
  <circle cx="200" cy="200" r="165" fill="none" stroke="#1e3a8a" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Decorative elements -->
  <circle cx="80" cy="80" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="320" cy="320" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="320" cy="80" r="3" fill="#10b981" opacity="0.5"/>
  <circle cx="80" cy="320" r="3" fill="#10b981" opacity="0.5"/>
</svg>