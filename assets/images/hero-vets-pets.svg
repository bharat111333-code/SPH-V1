<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f5f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="500" fill="url(#bgGrad)"/>
  
  <!-- Medical room background -->
  <rect x="0" y="0" width="600" height="350" fill="#ffffff" opacity="0.9"/>
  <rect x="0" y="350" width="600" height="150" fill="#f5f5f5"/>
  
  <!-- Window -->
  <rect x="420" y="40" width="150" height="120" fill="#87ceeb" rx="5"/>
  <line x1="495" y1="40" x2="495" y2="160" stroke="#ddd" stroke-width="2"/>
  <line x1="420" y1="100" x2="570" y2="100" stroke="#ddd" stroke-width="2"/>
  
  <!-- Veterinarian (Left) -->
  <!-- Head -->
  <circle cx="120" cy="80" r="25" fill="#f4a460"/>
  <!-- Body (white coat) -->
  <rect x="95" y="110" width="50" height="80" fill="#ffffff" stroke="#0066cc" stroke-width="2" rx="5"/>
  <!-- Stethoscope -->
  <path d="M 115 120 Q 100 140 105 160" stroke="#dd5a4a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 125 120 Q 140 140 135 160" stroke="#dd5a4a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="115" cy="165" r="4" fill="#dd5a4a"/>
  <circle cx="135" cy="165" r="4" fill="#dd5a4a"/>
  <!-- Arms -->
  <rect x="65" y="115" width="30" height="15" fill="#f4a460" rx="7"/>
  <rect x="145" y="115" width="30" height="15" fill="#f4a460" rx="7"/>
  <!-- Legs -->
  <rect x="105" y="190" width="10" height="40" fill="#333333"/>
  <rect x="125" y="190" width="10" height="40" fill="#333333"/>
  <!-- Shoes -->
  <ellipse cx="110" cy="235" rx="8" ry="6" fill="#1a1a1a"/>
  <ellipse cx="130" cy="235" rx="8" ry="6" fill="#1a1a1a"/>
  
  <!-- Dog (being held by vet on left) -->
  <!-- Dog body -->
  <ellipse cx="180" cy="150" rx="35" ry="30" fill="#d2691e"/>
  <!-- Dog head -->
  <circle cx="220" cy="130" r="22" fill="#d2691e"/>
  <!-- Dog ears -->
  <ellipse cx="205" cy="105" rx="8" ry="15" fill="#8b4513"/>
  <ellipse cx="235" cy="105" rx="8" ry="15" fill="#8b4513"/>
  <!-- Dog snout -->
  <ellipse cx="235" cy="140" rx="10" ry="8" fill="#a0522d"/>
  <!-- Dog eye -->
  <circle cx="230" cy="125" r="3" fill="#000000"/>
  <!-- Dog tail -->
  <path d="M 150 160 Q 130 150 125 130" stroke="#d2691e" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Veterinarian (Right/Center) -->
  <!-- Head -->
  <circle cx="380" cy="85" r="25" fill="#f4a460"/>
  <!-- Body (white coat) -->
  <rect x="355" y="115" width="50" height="80" fill="#ffffff" stroke="#0066cc" stroke-width="2" rx="5"/>
  <!-- Clipboard -->
  <rect x="320" y="130" width="25" height="35" fill="#f5deb3" stroke="#8b7355" stroke-width="1" rx="2"/>
  <!-- Clip at top -->
  <rect x="328" y="128" width="9" height="6" fill="#c0c0c0"/>
  <!-- Arms (holding cat) -->
  <rect x="325" y="120" width="30" height="15" fill="#f4a460" rx="7"/>
  <rect x="405" y="120" width="30" height="15" fill="#f4a460" rx="7"/>
  <!-- Legs -->
  <rect x="365" y="195" width="10" height="40" fill="#333333"/>
  <rect x="385" y="195" width="10" height="40" fill="#333333"/>
  <!-- Shoes -->
  <ellipse cx="370" cy="240" rx="8" ry="6" fill="#1a1a1a"/>
  <ellipse cx="390" cy="240" rx="8" ry="6" fill="#1a1a1a"/>
  
  <!-- Cat (being held by vet on right) -->
  <!-- Cat body -->
  <ellipse cx="440" cy="155" rx="32" ry="28" fill="#ff8c00"/>
  <!-- Cat head -->
  <circle cx="475" cy="138" r="20" fill="#ff8c00"/>
  <!-- Cat ears (triangular) -->
  <polygon points="465,113 475,95 485,113" fill="#ff8c00"/>
  <polygon points="485,113 495,95 505,113" fill="#ff8c00"/>
  <!-- Inner ear pink -->
  <polygon points="468,112 475,100 482,112" fill="#ffb6c1"/>
  <polygon points="488,112 495,100 502,112" fill="#ffb6c1"/>
  <!-- Cat snout -->
  <ellipse cx="492" cy="148" rx="9" ry="7" fill="#ffb347"/>
  <!-- Cat eyes -->
  <ellipse cx="485" cy="132" rx="3" ry="5" fill="#000000"/>
  <ellipse cx="500" cy="132" rx="3" ry="5" fill="#000000"/>
  <!-- Cat tail -->
  <path d="M 420 160 Q 400 170 395 150" stroke="#ff8c00" stroke-width="11" fill="none" stroke-linecap="round"/>
  
  <!-- Medical details on wall (background) -->
  <!-- Picture frame -->
  <rect x="30" y="50" width="60" height="60" fill="#f0f0f0" stroke="#999" stroke-width="2" rx="2"/>
  <text x="60" y="85" font-size="30" text-anchor="middle" fill="#0066cc">♥</text>
  
  <!-- Equipment on shelf -->
  <rect x="500" y="60" width="15" height="40" fill="#87ceeb" stroke="#0066cc" stroke-width="1"/>
  <rect x="520" y="55" width="15" height="45" fill="#87ceeb" stroke="#0066cc" stroke-width="1"/>
  <rect x="540" y="65" width="15" height="35" fill="#87ceeb" stroke="#0066cc" stroke-width="1"/>
  
  <!-- Floor -->
  <rect x="0" y="400" width="600" height="100" fill="#e0e0e0"/>
  
  <!-- Title -->
  <text x="300" y="450" font-size="24" font-weight="bold" text-anchor="middle" fill="#0066cc">Professional Pet Healthcare</text>
</svg>