<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#heroGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="1050" cy="300" r="120" fill="rgba(255,255,255,0.08)"/>
  
  <!-- Stethoscope icon -->
  <g transform="translate(200, 100)">
    <circle cx="0" cy="0" r="50" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
    <path d="M -20,-10 Q 0,-30 20,-10" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="-15" cy="10" r="8" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="15" cy="10" r="8" fill="none" stroke="white" stroke-width="3"/>
    <path d="M -15,20 L -15,40 M 15,20 L 15,40" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Paw icon -->
  <g transform="translate(1000, 120)">
    <circle cx="0" cy="0" r="50" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
    <!-- Main pad -->
    <circle cx="0" cy="15" r="12" fill="white"/>
    <!-- Toe pads -->
    <circle cx="-18" cy="-10" r="8" fill="white"/>
    <circle cx="0" cy="-20" r="8" fill="white"/>
    <circle cx="18" cy="-10" r="8" fill="white"/>
  </g>
  
  <!-- Text would be overlaid by HTML -->
</svg>